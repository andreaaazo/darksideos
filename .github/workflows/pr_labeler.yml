name: PR Labeler

on:
    pull_request_target:
        types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
    contents: read
    pull-requests: write

jobs:
    labeler:
        name: Apply PR Labels
        runs-on: ubuntu-latest
        steps:
            - name: Label pull request
              uses: actions/labeler@v6
